<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Setup 3 – MHC Rosmalen</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #F4F5F7; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
    .card { background: #fff; border-radius: 12px; border: 1px solid #D1D5DB; padding: 2rem; max-width: 480px; width: 100%; }
    .card img { width: 64px; display: block; margin: 0 auto 1rem; }
    h2 { font-size: 1.2rem; font-weight: 600; text-align: center; margin-bottom: .5rem; color: #0E2A5A; }
    p { font-size: .875rem; color: #6B7280; text-align: center; margin-bottom: 1.5rem; }
    .log { background: #F4F5F7; border-radius: 8px; padding: 1rem; font-size: .8125rem; font-family: monospace; min-height: 100px; margin-bottom: 1rem; }
    .log div { padding: 2px 0; }
    .ok { color: #16A34A; } .err { color: #DC2626; } .info { color: #6B7280; }
    .btn { width: 100%; padding: 12px; font-family: inherit; font-size: 1rem; font-weight: 600; background: #0E2A5A; color: #fff; border: none; border-radius: 8px; cursor: pointer; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .warning { background: #FEF3C7; border: 1px solid #FCD34D; border-radius: 8px; padding: .75rem; font-size: .8125rem; color: #92400E; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div class="card">
    <img src="logo_mhcrosmalen.gif" alt="MHC Rosmalen">
    <h2>Setup 3 – Gebruikers herschrijven</h2>
    <p>Schrijft alle gebruikers opnieuw naar Firebase met correcte keys (zonder speciale tekens).</p>
    <div class="warning">⚠️ Verwijder dit bestand direct na uitvoeren!</div>
    <div class="log" id="log"><div class="info">Klik op Start...</div></div>
    <button class="btn" id="btn" onclick="runSetup()">Start</button>
  </div>
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getDatabase, ref, set, remove } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';
    const app = initializeApp({
      apiKey: "AIzaSyB-4C_wE2_ueGIf44FL9UK2lmg6Cn7SxdU",
      authDomain: "mhcrosmalen-a09a0.firebaseapp.com",
      databaseURL: "https://mhcrosmalen-a09a0-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "mhcrosmalen-a09a0",
      storageBucket: "mhcrosmalen-a09a0.firebasestorage.app",
      messagingSenderId: "396855295814",
      appId: "1:396855295814:web:28dd001dcdad4dc861af47"
    });
    const db = getDatabase(app);

    // Alle gebruikers met correcte keys (. en @ vervangen door _)
    const gebruikers = [
      { email: 'mhcrosmalenwebapps@gmail.com', rol: 'superadmin', naam: 'Superadmin' },
      { email: 'ceesenjoyce2024@gmail.com', rol: 'technische_coordinator', naam: 'Cees' },
      { email: 'ceespijnenburg014@gmail.com', rol: 'lijncoordinator', naam: 'Lijncoördinator' },
      { email: 'eikenlaan001@gmail.com', rol: 'bestuurslid', naam: 'Bestuurslid' }
    ];

    function emailNaarKey(email) {
      return email.replace(/[.@]/g, '_');
    }

    function log(msg, type='info') {
      const el = document.createElement('div');
      el.className = type;
      el.textContent = msg;
      document.getElementById('log').appendChild(el);
    }

    window.runSetup = async function() {
      const btn = document.getElementById('btn');
      btn.disabled = true;
      document.getElementById('log').innerHTML = '';
      log('Bezig...', 'info');

      // Verwijder eerst oude node
      try {
        await remove(ref(db, 'gebruikers'));
        log('✓ Oude gebruikers verwijderd', 'ok');
      } catch(e) {
        log(`Waarschuwing bij verwijderen: ${e.message}`, 'info');
      }

      // Schrijf alle gebruikers opnieuw
      for (const g of gebruikers) {
        try {
          const key = emailNaarKey(g.email);
          await set(ref(db, `gebruikers/${key}`), {
            email: g.email,
            rol: g.rol,
            naam: g.naam,
            aangemaakt: new Date().toISOString()
          });
          log(`✓ ${g.email} (key: ${key}) → ${g.rol}`, 'ok');
        } catch(e) {
          log(`✗ Fout bij ${g.email}: ${e.message}`, 'err');
        }
      }

      log('', 'info');
      log('Klaar! Verwijder setup3.html nu van GitHub.', 'ok');
      btn.textContent = 'Klaar ✓';
    };
  </script>
</body>
</html>
