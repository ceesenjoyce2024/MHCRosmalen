<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Setup 2 – MHC Rosmalen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #F4F5F7; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
    .card { background: #fff; border-radius: 12px; border: 1px solid #D1D5DB; padding: 2rem; max-width: 480px; width: 100%; }
    .card img { width: 64px; display: block; margin: 0 auto 1rem; }
    h2 { font-size: 1.2rem; font-weight: 600; text-align: center; margin-bottom: .5rem; color: #0E2A5A; }
    p { font-size: .875rem; color: #6B7280; text-align: center; margin-bottom: 1.5rem; line-height: 1.5; }
    .log { background: #F4F5F7; border-radius: 8px; padding: 1rem; font-size: .8125rem; font-family: monospace; min-height: 80px; margin-bottom: 1rem; }
    .log-item { padding: 3px 0; }
    .log-item.ok { color: #16A34A; }
    .log-item.err { color: #DC2626; }
    .log-item.info { color: #6B7280; }
    .btn { width: 100%; padding: 12px; font-family: inherit; font-size: 1rem; font-weight: 600; background: #0E2A5A; color: #fff; border: none; border-radius: 8px; cursor: pointer; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .warning { background: #FEF3C7; border: 1px solid #FCD34D; border-radius: 8px; padding: .75rem 1rem; font-size: .8125rem; color: #92400E; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div class="card">
    <img src="logo_mhcrosmalen.gif" alt="MHC Rosmalen">
    <h2>Setup 2 – Superadmin toevoegen</h2>
    <p>Voegt het superadmin account toe aan Firebase. Eenmalig uitvoeren en daarna verwijderen van GitHub.</p>
    <div class="warning">⚠️ Verwijder dit bestand direct na uitvoeren van GitHub!</div>
    <div class="log" id="log"><div class="log-item info">Klik op "Start" om te beginnen...</div></div>
    <button class="btn" id="btn" onclick="runSetup()">Start</button>
  </div>
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getDatabase, ref, set } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';
    const app = initializeApp({
      apiKey: "AIzaSyB-4C_wE2_ueGIf44FL9UK2lmg6Cn7SxdU",
      authDomain: "mhcrosmalen-a09a0.firebaseapp.com",
      databaseURL: "https://mhcrosmalen-a09a0-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "mhcrosmalen-a09a0",
      storageBucket: "mhcrosmalen-a09a0.firebasestorage.app",
      messagingSenderId: "396855295814",
      appId: "1:396855295814:web:28dd001dcdad4dc861af47"
    });
    const db = getDatabase(app);
    function log(msg, type='info') {
      const el = document.createElement('div');
      el.className = `log-item ${type}`;
      el.textContent = msg;
      document.getElementById('log').appendChild(el);
    }
    window.runSetup = async function() {
      const btn = document.getElementById('btn');
      btn.disabled = true;
      document.getElementById('log').innerHTML = '';
      log('Bezig...', 'info');
      try {
        const key = 'mhcrosmalenwebapps@gmail,com'.replace('@', '@');
        await set(ref(db, `gebruikers/${('mhcrosmalenwebapps@gmail.com').replace(/\./g, ',')}`), {
          email: 'mhcrosmalenwebapps@gmail.com',
          rol: 'superadmin',
          naam: 'Superadmin',
          aangemaakt: new Date().toISOString()
        });
        log('✓ mhcrosmalenwebapps@gmail.com → superadmin', 'ok');
        log('Klaar! Verwijder setup2.html nu van GitHub.', 'ok');
        btn.textContent = 'Klaar ✓';
      } catch(e) {
        log(`✗ Fout: ${e.message}`, 'err');
        btn.disabled = false;
      }
    };
  </script>
</body>
</html>
