<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Setup 4 – MHC Rosmalen</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #F4F5F7; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
    .card { background: #fff; border-radius: 12px; border: 1px solid #D1D5DB; padding: 2rem; max-width: 480px; width: 100%; text-align: center; }
    img { width: 64px; display: block; margin: 0 auto 1rem; }
    h2 { font-size: 1.2rem; font-weight: 600; margin-bottom: .5rem; color: #0E2A5A; }
    p { font-size: .875rem; color: #6B7280; margin-bottom: 1.5rem; }
    .log { background: #F4F5F7; border-radius: 8px; padding: 1rem; font-size: .8125rem; font-family: monospace; min-height: 120px; margin-bottom: 1rem; text-align: left; }
    .log div { padding: 2px 0; }
    .ok { color: #16A34A; } .err { color: #DC2626; } .info { color: #6B7280; }
    .btn { width: 100%; padding: 12px; font-family: inherit; font-size: 1rem; font-weight: 600; background: #0E2A5A; color: #fff; border: none; border-radius: 8px; cursor: pointer; margin-bottom: .5rem; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .warning { background: #FEF3C7; border: 1px solid #FCD34D; border-radius: 8px; padding: .75rem; font-size: .8125rem; color: #92400E; margin-bottom: 1rem; text-align: left; }
  </style>
</head>
<body>
  <div class="card">
    <img src="logo_mhcrosmalen.gif" alt="MHC Rosmalen">
    <h2>Setup 4 – Gebruikers aanmaken</h2>
    <p>Schrijft alle gebruikers één voor één naar Firebase.</p>
    <div class="warning">⚠️ Verwijder dit bestand direct na uitvoeren!</div>
    <div class="log" id="log"><div class="info">Klik op een knop om te starten...</div></div>
    <button class="btn" id="btn1" onclick="schrijfGebruiker(0)">1. Superadmin aanmaken</button>
    <button class="btn" id="btn2" onclick="schrijfGebruiker(1)">2. Technische coördinator aanmaken</button>
    <button class="btn" id="btn3" onclick="schrijfGebruiker(2)">3. Lijncoördinator aanmaken</button>
    <button class="btn" id="btn4" onclick="schrijfGebruiker(3)">4. Bestuurslid aanmaken</button>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getDatabase, ref, set } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

    const app = initializeApp({
      apiKey: "AIzaSyB-4C_wE2_ueGIf44FL9UK2lmg6Cn7SxdU",
      authDomain: "mhcrosmalen-a09a0.firebaseapp.com",
      databaseURL: "https://mhcrosmalen-a09a0-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "mhcrosmalen-a09a0",
      storageBucket: "mhcrosmalen-a09a0.firebasestorage.app",
      messagingSenderId: "396855295814",
      appId: "1:396855295814:web:28dd001dcdad4dc861af47"
    });

    const db = getDatabase(app);

    const gebruikers = [
      { email: 'mhcrosmalenwebapps@gmail.com', rol: 'superadmin', naam: 'Superadmin' },
      { email: 'ceesenjoyce2024@gmail.com', rol: 'technische_coordinator', naam: 'Cees' },
      { email: 'ceespijnenburg014@gmail.com', rol: 'lijncoordinator', naam: 'Lijncoördinator' },
      { email: 'eikenlaan001@gmail.com', rol: 'bestuurslid', naam: 'Bestuurslid' }
    ];

    function log(msg, type='info') {
      const el = document.createElement('div');
      el.className = type;
      el.textContent = msg;
      document.getElementById('log').appendChild(el);
    }

    window.schrijfGebruiker = async function(index) {
      const g = gebruikers[index];
      const btn = document.getElementById(`btn${index+1}`);
      btn.disabled = true;
      btn.textContent = 'Bezig...';
      const key = g.email.replace(/[.@]/g, '_');
      log(`Schrijven: ${g.email} (key: ${key})...`, 'info');
      try {
        await set(ref(db, `gebruikers/${key}`), {
          email: g.email,
          rol: g.rol,
          naam: g.naam,
          aangemaakt: new Date().toISOString()
        });
        log(`✓ ${g.naam} (${g.rol}) opgeslagen!`, 'ok');
        btn.textContent = '✓ Klaar';
      } catch(e) {
        log(`✗ Fout: ${e.message}`, 'err');
        btn.disabled = false;
        btn.textContent = `${index+1}. Opnieuw proberen`;
      }
    };
  </script>
</body>
</html>
